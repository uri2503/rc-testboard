<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>rc-testboard</title>
<style>
  :root{
    --bg:#14161a; --panel:#1c1f26; --panel-2:#21252d; --line:#2c313b;
    --text:#e8e9ec; --text-dim:#8b909c; --accent:#4f8cff;
    --ok:#33c17a; --bug:#ef5350; --idea:#f5a623; --frage:#9c7cf5;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  header{
    position:sticky; top:0; z-index:10;
    background:rgba(20,22,26,0.95); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line); padding:16px;
  }
  header h1{ font-size:17px; margin:0; font-weight:700; }
  header .sub{ font-size:12px; color:var(--text-dim); margin-top:2px; }

  main{ padding:14px; max-width:640px; margin:0 auto; }

  .new-run{
    display:flex; gap:8px; margin-bottom:18px;
  }
  .new-run input{
    flex:1; background:var(--panel-2); border:1px solid var(--line);
    border-radius:10px; color:var(--text); padding:12px 14px; font-size:14px;
    font-family:inherit;
  }
  .new-run input:focus{ outline:none; border-color:var(--accent); }
  .new-run button{
    background:var(--accent); color:#fff; border:none; border-radius:10px;
    padding:0 18px; font-weight:700; font-size:14px; cursor:pointer;
  }
  .new-run button:active{ transform:scale(0.96); }

  .run-card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; margin-bottom:10px; display:flex; align-items:center;
    justify-content:space-between; gap:10px; cursor:pointer;
  }
  .run-card:active{ background:var(--panel-2); }
  .run-info{ flex:1; min-width:0; }
  .run-name{ font-size:15px; font-weight:700; margin-bottom:4px; }
  .run-meta{ font-size:12px; color:var(--text-dim); display:flex; gap:10px; flex-wrap:wrap; }
  .badge-counts{ display:flex; gap:5px; flex-wrap:wrap; }
  .badge{
    font-size:11px; font-weight:700; padding:2px 7px; border-radius:8px;
  }
  .badge.ok{ background:rgba(51,193,122,0.15); color:var(--ok); }
  .badge.bug{ background:rgba(239,83,80,0.15); color:var(--bug); }
  .badge.idea{ background:rgba(245,166,35,0.15); color:var(--idea); }
  .badge.frage{ background:rgba(156,124,245,0.15); color:var(--frage); }
  .run-del{
    background:none; border:none; color:var(--text-dim); font-size:18px;
    padding:6px 8px; flex-shrink:0;
  }
  .run-del:active{ color:var(--bug); }

  .empty{ text-align:center; padding:50px 20px; color:var(--text-dim); }
  .empty .icon{ font-size:32px; margin-bottom:10px; }

  .loading{ text-align:center; padding:40px; color:var(--text-dim); font-size:13px; }
</style>
</head>
<body>

<header>
  <h1>🧪 rc-testboard</h1>
  <div class="sub">Testläufe verwalten</div>
</header>

<main>
  <div class="new-run">
    <input type="text" id="newRunName" placeholder="Name des Testlaufs, z.B. AnzeigenAutopilot Checkout" maxlength="120">
    <button id="createRunBtn">+ Anlegen</button>
  </div>

  <div id="listContainer">
    <div class="loading">Lade Testläufe…</div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://ysqzdqazcgyuzdorauiq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_v4kXJa0y-2EHsCFPqBFHfg_QvzKLnt2';

function sbHeaders(extra){
  return Object.assign({
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json'
  }, extra || {});
}

const statusLabel = { ok:'OK', bug:'Bug', idea:'Idee', frage:'Frage' };

async function loadRuns(){
  const container = document.getElementById('listContainer');
  try{
    const res = await fetch(SUPABASE_URL + '/rest/v1/testboard_runs?select=*&order=updated_at.desc', {
      headers: sbHeaders()
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const runs = await res.json();

    if(runs.length === 0){
      container.innerHTML = '<div class="empty"><div class="icon">🗂️</div>Noch kein Testlauf angelegt.<br>Leg oben den ersten an.</div>';
      return;
    }

    // Für jeden Run die Step-Counts pro Status holen
    const stepsRes = await fetch(SUPABASE_URL + '/rest/v1/testboard_steps?select=run_id,status', {
      headers: sbHeaders()
    });
    const allSteps = stepsRes.ok ? await stepsRes.json() : [];

    container.innerHTML = '';
    runs.forEach(run => {
      const stepsForRun = allSteps.filter(s => s.run_id === run.id);
      const counts = { ok:0, bug:0, idea:0, frage:0 };
      stepsForRun.forEach(s => { if(s.status && counts[s.status] !== undefined) counts[s.status]++; });

      const card = document.createElement('div');
      card.className = 'run-card';

      const info = document.createElement('div');
      info.className = 'run-info';
      const nameEl = document.createElement('div');
      nameEl.className = 'run-name';
      nameEl.textContent = run.name;
      const meta = document.createElement('div');
      meta.className = 'run-meta';

      const stepCountSpan = document.createElement('span');
      stepCountSpan.textContent = stepsForRun.length + (stepsForRun.length === 1 ? ' Schritt' : ' Schritte');
      meta.appendChild(stepCountSpan);

      const badges = document.createElement('div');
      badges.className = 'badge-counts';
      Object.keys(counts).forEach(key => {
        if(counts[key] > 0){
          const b = document.createElement('span');
          b.className = 'badge ' + key;
          b.textContent = statusLabel[key] + ' ' + counts[key];
          badges.appendChild(b);
        }
      });
      meta.appendChild(badges);

      info.appendChild(nameEl);
      info.appendChild(meta);

      const delBtn = document.createElement('button');
      delBtn.className = 'run-del';
      delBtn.textContent = '✕';
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteRun(run.id, run.name);
      });

      card.appendChild(info);
      card.appendChild(delBtn);
      card.addEventListener('click', () => {
        window.location.href = 'board.html?run=' + run.id;
      });

      container.appendChild(card);
    });
  } catch(err){
    container.innerHTML = '<div class="empty">Fehler beim Laden. Bitte neu laden.</div>';
    console.error(err);
  }
}

async function createRun(){
  const input = document.getElementById('newRunName');
  const name = input.value.trim();
  if(!name) return;

  const btn = document.getElementById('createRunBtn');
  btn.disabled = true;

  try{
    const res = await fetch(SUPABASE_URL + '/rest/v1/testboard_runs', {
      method: 'POST',
      headers: sbHeaders({ 'Prefer': 'return=representation' }),
      body: JSON.stringify({ name })
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const newRun = data[0];
    window.location.href = 'board.html?run=' + newRun.id;
  } catch(err){
    alert('Konnte Testlauf nicht anlegen: ' + err.message);
    btn.disabled = false;
  }
}

async function deleteRun(runId, runName){
  if(!confirm('Testlauf "' + runName + '" komplett löschen? (inkl. aller Screenshots)')) return;
  try{
    await fetch(SUPABASE_URL + '/rest/v1/testboard_runs?id=eq.' + runId, {
      method: 'DELETE',
      headers: sbHeaders()
    });
    loadRuns();
  } catch(err){
    alert('Löschen fehlgeschlagen: ' + err.message);
  }
}

document.getElementById('createRunBtn').addEventListener('click', createRun);
document.getElementById('newRunName').addEventListener('keydown', e => {
  if(e.key === 'Enter') createRun();
});

loadRuns();
</script>
</body>
</html>
